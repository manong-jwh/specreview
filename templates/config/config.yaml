# specreview 配置
# ─────────────────────────────────────────────
# 以下角色为通用检查，适用于任何语言/项目。
# 如需添加语言特定检查（如 TypeScript 类型断言、
# Rust 生命周期、Python duck typing 等），
# 在下方自定义区域添加即可。
# ─────────────────────────────────────────────

roles:
  # ─── 通用角色（零语法绑定） ───
  code-check:
    title: 代码审查员
    description: 可读性、命名、DRY、注释、代码风格
    enabled: true
    priority: 10
  logic-check:
    title: 逻辑审查员
    description: 边界条件、分支覆盖、循环终止、状态流转
    enabled: true
    priority: 20
  spec-check:
    title: 需求审查员
    description: 需求覆盖、范围控制、设计偏差
    enabled: true
    priority: 25
  perf-check:
    title: 性能审查员
    description: N+1、循环耗时操作、资源释放
    enabled: true
    priority: 30
  dep-check:
    title: 依赖审查员
    description: 依赖必要性、版本兼容、安全漏洞
    enabled: true
    priority: 40
  security-check:
    title: 安全审查员
    description: 注入防护、敏感信息、权限校验
    enabled: true
    priority: 60
  test-check:
    title: 测试审查员
    description: 异常捕获、超时重试、日志记录、降级策略
    enabled: true
    priority: 70

report:
  format: markdown
  group_by: role
  show_summary: true
  severity_labels:
    high: 🔴 高
    mid: 🟡 中
    low: 🟢 低
